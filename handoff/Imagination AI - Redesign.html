<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1400" />
<title>Imagination.ai · Redesign</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React 18 + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body, #root { height: 100%; }
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #efece6; color: #fafafa; -webkit-font-smoothing: antialiased; }
  .font-serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.01em; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  em { font-style: italic; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  /* Custom scrollbar in panels */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  /* Slider track */
  input[type=range] { height: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Load order matters -->
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="pages-home.jsx"></script>
<script type="text/babel" src="pages-models.jsx"></script>
<script type="text/babel" src="pages-chat.jsx"></script>
<script type="text/babel" src="pages-pricing.jsx"></script>
<script type="text/babel" src="pages-blog.jsx"></script>
<script type="text/babel" src="pages-news.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#b478fd",
  "serifTitles": true,
  "heroVideo": true,
  "showV2Only": false,
  "showV1Only": false,
  "density": "regular"
}/*EDITMODE-END*/;

const HERO_VIDEO = "uploads/hero-bg.mp4";

// Page configuration — label + component factory per artboard
const PAGES = [
  { id: 'home',    title: 'Главная',    sub: 'Лендинг с hero-видео', v1: () => <HomeV1 />, v2: () => <HomeV2 /> },
  { id: 'models',  title: 'Каталог моделей', sub: 'Флагманы + фильтры / Сравнение', v1: () => <ModelsV1 />, v2: () => <ModelsV2 /> },
  { id: 'chat',    title: 'Чат-студия',  sub: 'Студия MJ-стиль / Диалог с рич-карточками', v1: () => <ChatV1 />, v2: () => <ChatV2 /> },
  { id: 'pricing', title: 'Тарифы',      sub: 'Калькулятор / Паки + FAQ', v1: () => <PricingV1 />, v2: () => <PricingV2 /> },
  { id: 'blog',    title: 'Блог',        sub: 'Magazine / Editorial', v1: () => <BlogV1 />, v2: () => <BlogV2 /> },
  { id: 'news',    title: 'Новости',     sub: 'Changelog timeline / Hero + ticker', v1: () => <NewsV1 />, v2: () => <NewsV2 /> },
];

// Hero video injection — swap every .home-hero-bg with a real <video>
const HomeHeroVideo = ({ children }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const v = ref.current;
    if (v) { v.muted = true; v.play().catch(() => {}); }
  }, []);
  return (
    <video ref={ref} src={HERO_VIDEO} autoPlay muted loop playsInline
      className="absolute inset-0 w-full h-full object-cover" />
  );
};

// Wrap HomeV1/V2 renders so the hero gets real video when toggled on
const HomeV1WithVideo = () => {
  const out = HomeV1();
  return out;
};

// Swap the first radial-gradient hero bg in HomeV1 with a video via CSS overlay
// (Simpler: we just let HomeV1 render; the gradient already works. Video is
//  optional — inject via a portal if we want it live.)
const Artboard = ({ page, version, tweaks }) => {
  const Comp = version === 'v1' ? page.v1 : page.v2;
  // Scope style — respect tweaks
  const scopeStyle = {
    '--accent': tweaks.accent,
  };
  return (
    <div style={{ width: 1320, height: 900, overflow: 'hidden', position: 'relative', background: '#0a0a0a', ...scopeStyle }}>
      {/* Inject hero video overlay for home page when enabled */}
      {page.id === 'home' && tweaks.heroVideo && (
        <HomeHeroOverlay video={HERO_VIDEO} variant={version} />
      )}
      <div style={{ width: '100%', height: '100%', overflowY: 'auto' }} className="dc-artboard-scroll">
        <Comp />
      </div>
      {/* Accent override via CSS */}
      <style>{`
        [data-tw-accent] { color: ${tweaks.accent} !important; }
      `}</style>
    </div>
  );
};

// Video overlay sits above the gradient hero in Home variants
const HomeHeroOverlay = ({ video, variant }) => {
  const h = variant === 'v1' ? 780 : 620;
  return (
    <div style={{ position: 'absolute', top: 56, left: 0, right: 0, height: h, overflow: 'hidden', pointerEvents: 'none', zIndex: 1 }}>
      <video src={video} autoPlay muted loop playsInline
        style={{ width: '100%', height: '100%', objectFit: 'cover', opacity: 0.55 }} />
      <div style={{ position: 'absolute', inset: 0, background: variant === 'v1'
        ? 'radial-gradient(ellipse at 50% 60%, rgba(10,10,10,0.4), rgba(10,10,10,0.85) 70%)'
        : 'linear-gradient(90deg, rgba(10,10,10,0.92) 0%, rgba(10,10,10,0.5) 60%, rgba(10,10,10,0.2) 100%)'
      }} />
    </div>
  );
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const versions = t.showV1Only ? ['v1'] : t.showV2Only ? ['v2'] : ['v1','v2'];

  return (
    <div style={{ width: '100vw', height: '100vh' }}>
      <DesignCanvas>
        {PAGES.map(page => (
          <DCSection key={page.id} id={page.id} title={page.title} subtitle={page.sub}>
            {versions.map(v => (
              <DCArtboard key={v} id={`${page.id}-${v}`} label={`${v.toUpperCase()} · ${v === 'v1' ? 'Вариант 1' : 'Вариант 2'}`} width={1320} height={900}>
                <Artboard page={page} version={v} tweaks={t} />
              </DCArtboard>
            ))}
          </DCSection>
        ))}
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Общие" />
        <TweakColor  label="Акцент"      value={t.accent}      onChange={v => setTweak('accent', v)} />
        <TweakToggle label="Видео в hero" value={t.heroVideo}   onChange={v => setTweak('heroVideo', v)} />
        <TweakSection label="Отображение вариантов" />
        <TweakToggle label="Только V1"    value={t.showV1Only}  onChange={v => { setTweak('showV1Only', v); if (v) setTweak('showV2Only', false); }} />
        <TweakToggle label="Только V2"    value={t.showV2Only}  onChange={v => { setTweak('showV2Only', v); if (v) setTweak('showV1Only', false); }} />
        <TweakSection label="Типографика" />
        <TweakToggle label="Serif заголовки" value={t.serifTitles} onChange={v => setTweak('serifTitles', v)} />
      </TweaksPanel>
    </div>
  );
}

// Accent color CSS variable
const applyAccent = (color) => {
  // Try replacing TOKENS.accent at runtime — update all elements using it
  document.documentElement.style.setProperty('--accent', color);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
